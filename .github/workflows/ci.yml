name: SCC-SIS Frontend CI/CD

on:
  push:
    branches:
      - main
      - dev
      - huy2.5
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Lint Code
        run: npm run lint || echo "Lint errors found but continuing..."

      - name: 🧪 Run Tests
        run: npm run test

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📄 Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-and-push-docker:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/huy2.5')

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: huy210205/scc-sis-fe
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/huy2.5' || github.ref == 'refs/heads/main' }}

      - name: 🔨 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=huy210205/scc-sis-fe:buildcache
          cache-to: type=registry,ref=huy210205/scc-sis-fe:buildcache,mode=max

      - name: 🎉 Docker Image Info
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: huy210205/scc-sis-fe"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
